# =============================================================================
# ЧЕК-ЛИСТ ПОД НОВОГО КЛИЕНТА — что реально нужно поменять при разворачивании
# на другую компанию (см. также PLAN.md):
#
#   1. Секция "КЛИЕНТ" ниже — название, точки, ссылки на площадки
#   2. tone_of_voice.md — переписать под голос нового бренда (шаблон структуры
#      можно оставить, содержание — нет)
#   3. clients/<slug>/.env — СВОИ TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID и APIFY_API_TOKEN
#      (не бот/аккаунт Жоржа и не бот/аккаунт предыдущего клиента — разный биллинг
#      Apify на разных клиентов). Корневой .env — только fallback для реально общих
#      ключей (PROXYAPI_KEY/GROQ_API_KEY), если один аккаунт LLM-провайдера на всех.
#   4. clients/<slug>/db/ — НЕ копировать от старого клиента, пусть создастся с нуля
#      (main_collect.py сам создаст пустую БД при первом запуске)
#   5. ПЕРВЫЙ сбор истории — ОБЯЗАТЕЛЬНО с флагом --backfill:
#      CLIENT_SLUG=<slug> python main_collect.py --backfill
#      Без флага следующий main_notify.py разошлёт карточку по КАЖДОМУ вставленному
#      отзыву одним пакетом (было на практике: 90 сообщений разом, 2026-07-09,
#      см. CHANGELOG). Это же касается любой ручной доливки старых отзывов в БД
#      в обход обычного цикла — не только самого первого запуска.
#   6. Секция "ШАБЛОН ПОД НИШУ" ниже — если новый клиент из ДРУГОЙ отрасли
#      (не фитнес-клуб) — переписать теги/категории полностью под его бизнес.
#      Если тоже фитнес — можно оставить как есть или точечно поправить.
#   7. Секция "ДВИЖОК" — можно стартовать с дефолтов (откалиброваны на первом
#      пилоте, разумные для большинства похожих бизнесов), пересмотреть после
#      1-2 месяцев реальных данных нового клиента — см. процесс в PLAN.md.
# =============================================================================


# =============================================================================
# КЛИЕНТ — обязательно поменять под нового
# =============================================================================
client:
  name: "World Class Тюмень"
  locations:
    - id: republiki245
      name: "World Class, ул. Республики, 245"
      city: "Тюмень"
      platforms:
        - type: 2gis
          url: "https://2gis.ru/tyumen/firm/70000001061124017/tab/reviews"
          max_reviews: 5         # Apify (zen-studio/2gis-reviews-scraper) тарифицируется за отзыв в выдаче — не тянем больше нужного. Опционально per-client: увеличить, если клуб реально штампует отзывы пачками
          lookback_days: 60      # reviewsStartDate — выдача не строго по дате, без фильтра проскакивают древние отзывы
          poll_interval_hours: 24  # 1 раз в день, отдельно от остальных площадок (см. collection.poll_interval_hours)
        - type: yandex_maps
          url: "https://yandex.ru/maps/org/world_class/126596138888/"
        - type: zoon
          url: "https://zoon.ru/tyumen/fitness/fitnes-klub_world_class_na_ulitse_respubliki/"
      # Flamp сознательно не добавлен — дублирует отзывы 2ГИС (общий владелец), плюс отдаёт 403 на прямой доступ.

tone_of_voice:
  source: document   # у клуба всего 1 реальный ответ в истории — "mined" не набрал бы данных
  path: "tone_of_voice.md"

notifications:
  telegram_chat_id: ""   # заполнить перед запуском (свой чат/бот на нового клиента, см. чек-лист выше)
  digest_time: "18:00"   # МСК; systemd timer настраивается отдельно (см. PLAN.md/README.md)


# =============================================================================
# ШАБЛОН ПОД НИШУ (фитнес-клубы) — переиспользуется для другого фитнес-клуба,
# для другой отрасли переписывается полностью
# =============================================================================

# Категории — модель ОБЯЗАНА сверяться с этими описаниями перед тем, как предложить
# новый тег: если явление уже покрывается описанием существующей категории/тега —
# новый тег не нужен. Новую категорию модель предлагать не может — только выбирает
# из этого списка (список категорий правится вручную, как и теги).
categories:
  - name: "подразделение"
    description: >
      Самостоятельное платное направление/услуга клуба — то, на что можно купить
      отдельный абонемент или что является отдельным залом со своим направлением
      (бассейн, тренажёрный зал, групповые программы, детский клуб, пилатес).
      Включает ЛЮБЫЕ упоминания помещения этого направления (например, вентиляция
      или теснота тренажёрного зала — это про "тренажёрный зал", а не про "зона клуба").
  - name: "зона клуба"
    description: >
      Общая физическая инфраструктура клуба, доступная всем посетителям бесплатно,
      не является отдельной платной услугой (раздевалка, душевые, сауна, хамам,
      комнаты релакс, парковка, кафе, интерьер/ремонт общих помещений).
  - name: "персонал"
    description: >
      Люди, работающие в клубе. Тренеры — конкретно про тренировки/инструкторов.
      Администраторы — про ресепшн, запись, оплату. "Персонал" общего вида —
      только если роль явно не уточнена в отзыве.
  - name: "коммерция"
    description: >
      Деньги и условия покупки: стоимость (цена) и состав/доступность платных
      услуг (услуги).
  - name: "сервис"
    description: >
      Качество исполнения процессов обслуживания, не привязанное к одной
      физической зоне (в первую очередь — чистота/уборка).
  - name: "оснащение"
    description: >
      Техническое состояние и исправность оборудования/инвентаря. НЕ включает
      ремонт, дизайн или эстетику помещений — это категория "зона клуба" (тег
      "интерьер").
  - name: "UX"
    description: >
      Субъективный опыт взаимодействия с клубом, не привязанный к конкретному
      месту или человеку: удобство расписания, атмосфера/настроение,
      слаженность организации процессов в целом.
  - name: "гео"
    description: >
      Расположение клуба относительно города/района — внешняя география,
      не внутренняя структура клуба.

tags:
  - {name: "бассейн", category: "подразделение", description: "Плавательный бассейн и связанные с ним занятия/услуги."}
  - {name: "тренажёрный зал", category: "подразделение", description: "Зал с тренажёрами и свободными весами, включая его помещение (вентиляция, планировка, теснота)."}
  - {name: "групповые программы", category: "подразделение", description: "Групповые тренировки/классы (не персональные и не тренажёрный зал сам по себе)."}
  - {name: "детский клуб", category: "подразделение", description: "Направление/зона для детей: детская комната, присмотр, детские программы."}
  - {name: "тренеры", category: "персонал", description: "Работа конкретных тренеров/инструкторов на тренировках."}
  - {name: "администраторы", category: "персонал", description: "Работа ресепшена/администрации: запись, оплата, коммуникация."}
  - {name: "персонал", category: "персонал", description: "Обслуживающий персонал общего вида, если роль не уточнена (не тренер и не администратор)."}
  - {name: "чистота", category: "сервис", description: "Уборка и гигиена в любых помещениях клуба."}
  - {name: "оборудование", category: "оснащение", description: "Техническое состояние, исправность, количество тренажёров/инвентаря."}
  - {name: "раздевалка", category: "зона клуба", description: "Раздевалки и шкафчики."}
  - {name: "душевые", category: "зона клуба", description: "Душевые кабины."}
  - {name: "сауна", category: "зона клуба", description: "Сауна."}
  - {name: "хамам", category: "зона клуба", description: "Хамам/парная."}
  - {name: "комнаты релакс", category: "зона клуба", description: "Зоны отдыха/релаксации."}
  - {name: "парковка", category: "зона клуба", description: "Парковка при клубе."}
  - {name: "кафе", category: "зона клуба", description: "Кафе/бар при клубе."}
  - {name: "интерьер", category: "зона клуба", description: "Ремонт, дизайн, эстетика помещений — НЕ чистота и НЕ оборудование."}
  - {name: "автомойка", category: "зона клуба", description: "Мойка автомобиля на территории клуба."}
  - {name: "цена", category: "коммерция", description: "Стоимость абонементов/услуг."}
  - {name: "услуги", category: "коммерция", description: "Состав, наличие, доступность конкретных платных услуг — НЕ включает возврат денег (тег «возврат средств»)."}
  - {name: "возврат средств", category: "коммерция", description: "Возврат/компенсация денег за неиспользованный абонемент/сертификат: сроки возврата, отказ вернуть, задержки. НЕ включает саму стоимость (тег «цена») или доступность услуг (тег «услуги»)."}
  - {name: "расписание", category: "UX", description: "Удобство расписания групповых занятий/записи на тренировки."}
  - {name: "атмосфера", category: "UX", description: "Общее субъективное впечатление/настроение в клубе."}
  - {name: "организация", category: "UX", description: "Насколько слаженно организованы процессы в клубе в целом."}
  - {name: "информирование", category: "UX", description: "Клиента не предупредили заранее об условиях/доплатах/изменении правил (например: доплата за часть групповых программ не оглашена при подписании договора, новое правило о минимальном сроке между абонементами введено без предупреждения, цена в рекламе не совпадает с реальной, администратор и отдел продаж дают разную информацию). НЕ сам факт наличия доплаты/условия — это «услуги»/«цена», а именно то, что об этом не сказали заранее."}
  - {name: "локация", category: "гео", description: "Расположение клуба относительно города, удобство добираться."}
  # Утверждено и откалибровано по категориям после двух прогонов на 52 отзывах (2026-07-06).
  # "возврат средств" и "информирование" добавлены 2026-07-14 — разбивка тега "услуги"
  # после находки на дашборде: 13 отзывов под одним тегом на деле распадались на
  # 6 дословно одинаковых жалоб (нарушение срока возврата денег, ст.31 ЗоЗПП) и
  # 7 разных случаев недоинформирования клиента. Читать полный разбор — CHANGELOG.
  # Новые теги, которые предложит модель при разборе отзывов, попадают в tag_dictionary
  # со статусом pending_review — утверждаются вручную, чтобы словарь не расползался.


# =============================================================================
# ДВИЖОК — общие технические дефолты, можно стартовать без изменений
# =============================================================================

collection:
  backfill_lookback_days: 180   # глубина истории при первом запуске (не тянем всю историю за 10 лет)
  poll_interval_hours: 6        # как часто проверять новые отзывы (кроме 2ГИС — см. override у площадки)
  discover_new_platforms: true  # v2: раз в неделю искать площадки, которые ещё не добавлены вручную

  # Окна для неотвеченных отзывов (по review_date — дате самого отзыва, не дедлайна SLA),
  # см. main_watchdog.py / main_weekly_stale.py:
  #   0 .. watchdog_recent_days           -> суточный watchdog (ещё срочно)
  #   watchdog_recent_days .. stale_cutoff -> недельный обзор (уже не срочно, но не забыто)
  #   > watchdog_stale_cutoff_days        -> нигде не показывается, но остаётся pending в БД для статистики
  watchdog_recent_days: 90
  watchdog_stale_cutoff_days: 180

alert_rules:
  default:
    - {window_days: 30, yellow_at: 3, red_at: 5}
    # yellow понижен с 7 до 3 (2026-07-06): при 7 ни одна реальная "тлеющая" тема (услуги=5,
    # цена=3, персонал=3 за 90 дней) не давала вообще никакого сигнала до 180-дневной
    # проверки — разрыв между "вспышкой" и "хронической проблемой" был слишком большим.
    # Теперь 90-дневное окно само ловит раннее "похоже, тлеет" желтым, не дожидаясь 180 дней.
    - {window_days: 90, yellow_at: 3, red_at: 6}
  overrides: {}
  # Пример override под чувствительную тему:
  # "хамство персонала": [{window_days: 30, yellow_at: 1, red_at: 2}]

  # "Тлеющая проблема" — ступенчатая эскалация, ДОПОЛНИТЕЛЬНО к вспышкам выше (не вместо).
  # Если 90-дневное окно уже дало yellow, эти уровни подтверждают, что проблема не
  # рассосалась сама, а тянется по-настоящему долго. Каждый уровень проверяется, только
  # если сработал предыдущий — 180 дней первый чек, 360/720 — подтверждение (red).
  # Пороги откалиброваны по реальным данным первого пилота (2026-07-06): "услуги" (11 за
  # 180 дней) должно дойти до red, "цена"/"персонал"/"администраторы" (6-8) — до yellow.
  chronic_tiers:
    - {window_days: 180, threshold: 6}
    - {window_days: 360, threshold: 9}
    - {window_days: 720, threshold: 14}

  # "Повторный негативщик" — один и тот же автор оставил несколько негативных
  # отзывов НА ОДНОЙ площадке (author+platform — не смешиваем площадки, одинаковое
  # имя на разных сайтах не гарантированно один человек). Порог — КАСТОМ под клиента,
  # не общий дефолт: у разных бизнесов разная база повторных клиентов и разная
  # чувствительность к конфликту с конкретным человеком. Значения ниже подобраны для
  # World Class по итогам обсуждения 2026-07-14, не перенесены "по умолчанию" из кода.
  #
  # Нет inline-кнопки "Связался" (см. PLAN.md — нужен webhook, отложено) — сервисная
  # служба клиента не технарь, main_ack.py для неё недоступен. Поэтому напоминание
  # не бесконечное "пока не acknowledged", а с жёстким потолком max_notifications —
  # после этого молчит само, чтобы не превратиться в спам без возможности отключить.
  repeat_offender:
    min_negative_count: 3    # столько НЕГАТИВНЫХ отзывов от одного автора на одной площадке...
    window_days: 60          # ...за это окно — триггерит алерт
    renotify_after_days: 2   # напоминать раз в 2 дня...
    max_notifications: 3     # ...но не больше 3 раз, дальше молчит (см. комментарий выше)

reply_sla_hours:
  negative: 24
  neutral: 72
  positive: null   # ответ не обязателен
