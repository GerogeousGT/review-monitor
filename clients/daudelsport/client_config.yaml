      # пока не подтверждено, что это тот же бизнес и не задвоятся отзывы.

tone_of_voice:
  source: document   # заполнить по образцу tone_of_voice.md WorldClass — нужны реальные примеры ответов клуба или интервью с владельцем/управляющим
  path: "tone_of_voice.md"

notifications:
  telegram_chat_id: ""   # реальное значение — в clients/daudelsport/.env (не в этом файле, попадает в публичный git)
  digest_time: "18:00"   # МСК; systemd timer настраивается отдельно (см. PLAN.md/README.md)


# =============================================================================
# ШАБЛОН ПОД НИШУ (фитнес-клубы) — унаследовано от WorldClass, тот же профиль
# бизнеса. Точечно адаптировано под Даудель Спорт (2026-07-08):
#   - "спа" выделено отдельным тегом от "бассейн" (у WorldClass было одним пунктом)
#   - единоборства/кроссфит/сайкл — намеренно НЕ отдельные теги, попадают в
#     "групповые программы" общего вида (см. описание тега ниже)
#   - TRX не добавлен как тег вообще — сейчас нет в услугах клуба, заводить тег
#     под несуществующую услугу смысла нет
# ПЕРЕСМОТРЕТЬ после первого реального прогона на отзывах Даудель Спорт, если
# какая-то из тем внутри "групповые программы" начнёт давать много упоминаний —
# тогда стоит выделить её отдельным тегом для точности алертов.
# =============================================================================

categories:
  - name: "подразделение"
    description: >
      Самостоятельное платное направление/услуга клуба — то, на что можно купить
      отдельный абонемент или что является отдельным залом со своим направлением
      (бассейн, тренажёрный зал, кардио зона, групповые программы, детский клуб, спа).
      Включает планировку/тесноту помещения направления, НО НЕ климат/вентиляцию —
      это отдельный тег "вентиляция" в категории "оснащение" (сквозная тема сразу
      для нескольких зон, не привязана к одному направлению).
  - name: "зона клуба"
    description: >
      Это КАТЕГОРИЯ, не тег — сама по себе не назначается отзыву напрямую, нужно
      выбрать конкретный тег внутри неё (раздевалка/душевые/сауна/хамам/комнаты
      релакс/парковка/кафе/интерьер). Общая физическая инфраструктура клуба,
      доступная всем посетителям бесплатно, не является отдельной платной услугой.
  - name: "персонал"
    description: >
      Люди, работающие в клубе. Тренеры — конкретно про тренировки/инструкторов.
      Администраторы — про ресепшн, запись, оплату. "Персонал" общего вида —
      только если роль явно не уточнена в отзыве.
  - name: "коммерция"
    description: >
      Деньги и условия покупки: стоимость (цена) и состав/доступность платных
      услуг (услуги), включая ограничения абонемента (лимит посещений в день и т.п.).
  - name: "сервис"
    description: >
      Качество исполнения процессов обслуживания, не привязанное к одной
      физической зоне (в первую очередь — чистота/уборка).
  - name: "оснащение"
    description: >
      Техническое состояние и исправность оборудования/инвентаря (в любой зоне —
      групповые программы, тренажёрный зал, бассейн), а также климат/воздух в
      помещениях (вентиляция, духота, влажность). НЕ включает ремонт, дизайн или
      эстетику помещений — это категория "зона клуба" (тег "интерьер").
  - name: "UX"
    description: >
      Субъективный опыт взаимодействия с клубом, не привязанный к конкретному
      месту или человеку: удобство расписания, атмосфера/настроение,
      слаженность организации процессов в целом.
  - name: "гео"
    description: >
      Расположение клуба относительно города/района — внешняя география,
      не внутренняя структура клуба.

tags:
  - {name: "бассейн", category: "подразделение", description: "Плавательный бассейн и связанные с ним занятия/услуги (включая переполненность дорожек)."}
  - {name: "тренажёрный зал", category: "подразделение", description: "Зал с тренажёрами и свободными весами, включая планировку и тесноту помещения (НЕ вентиляцию/климат — это тег «вентиляция»)."}
  - {name: "кардио зона", category: "подразделение", description: "Отдельная зона с кардиотренажёрами — самостоятельное помещение/направление в клубе, не тренажёрный зал в целом."}
  - {name: "групповые программы", category: "подразделение", description: "Групповые тренировки/классы любого вида (Les Mills, кроссфит, боевые искусства, TRX, сайкл, йога — не персональные и не тренажёрный зал сам по себе)."}
  - {name: "детский клуб", category: "подразделение", description: "Направление/зона для детей: детская комната, присмотр, детские программы (Даудель Kids)."}
  - {name: "спа", category: "подразделение", description: "СПА-услуги: МАССАЖ (в т.ч. упоминания слова «массаж» отдельно — это тег «спа», не новый тег) и связанные процедуры (не сауна/хамам — это зона клуба)."}
  - {name: "тренеры", category: "персонал", description: "Работа конкретных тренеров, В ТОМ ЧИСЛЕ если в отзыве использовано слово «инструктор»/«инструктора» — это синоним, тот же тег «тренеры», не новый тег. Включая то, подходят ли сами и предлагают ли помощь."}
  - {name: "администраторы", category: "персонал", description: "Работа ресепшена/администрации: запись, оплата, коммуникация."}
  - {name: "персонал", category: "персонал", description: "Обслуживающий персонал общего вида, если роль не уточнена (не тренер и не администратор)."}
  - {name: "чистота", category: "сервис", description: "Уборка и гигиена в любых помещениях клуба, включая чистоту воды в бассейне."}
  - {name: "сервис", category: "сервис", description: "Качество исполнения процессов обслуживания в целом (отдельная служба сервиса в клубе) — общее впечатление от обслуживания, НЕ чистота/уборка конкретно."}
  - {name: "оборудование", category: "оснащение", description: "Техническое состояние, исправность, количество тренажёров/инвентаря в любой зоне (тренажёрный зал, кардио зона, групповые программы, бассейн). Слово «оснащение» в отзыве — синоним «оборудования», не новый тег."}
  - {name: "вентиляция", category: "оснащение", description: "Климат, духота, влажность, качество воздуха в любом помещении клуба — особенно значимо в бассейне и зале."}
  - {name: "раздевалка", category: "зона клуба", description: "Раздевалки, шкафчики и санузел при них — «санузел» отдельным тегом не заводить, это раздевалка."}
  - {name: "душевые", category: "зона клуба", description: "Душевые кабины."}
  - {name: "сауна", category: "зона клуба", description: "Сауна."}
  - {name: "хамам", category: "зона клуба", description: "Хамам/парная."}
  - {name: "комнаты релакс", category: "зона клуба", description: "Зоны отдыха/релаксации."}
  - {name: "парковка", category: "зона клуба", description: "Парковка при клубе."}
  - {name: "кафе", category: "зона клуба", description: "Кафе/бар при клубе — «бар» отдельным тегом не заводить, это кафе."}
  - {name: "интерьер", category: "зона клуба", description: "Ремонт, дизайн, эстетика помещений — НЕ чистота и НЕ оборудование."}
  - {name: "цена", category: "коммерция", description: "Стоимость абонементов/услуг."}
  - {name: "услуги", category: "коммерция", description: "Состав, наличие, доступность и ограничения (лимит посещений/дорожек) конкретных платных услуг."}
  - {name: "расписание", category: "UX", description: "Удобство расписания групповых занятий/записи на тренировки (сам процесс планирования, не техническая реализация — см. тег «приложение»)."}
  - {name: "приложение", category: "UX", description: "Мобильное приложение клуба: запись на групповые тренировки, стабильность работы, функциональность."}
  - {name: "атмосфера", category: "UX", description: "Общее субъективное впечатление/настроение в клубе."}
  - {name: "организация", category: "UX", description: "Насколько слаженно организованы процессы в клубе в целом, включая общие жалобы на ухудшение со временем ('стало хуже', 'клуб изменился не в лучшую сторону' без конкретной темы)."}
  - {name: "локация", category: "гео", description: "Расположение клуба относительно города, удобство добираться."}
  # Первая калибровка проведена 2026-07-08 на 62 реальных отзывах Даудель Спорт
  # (2ГИС+Яндекс.Карты+Zoon). Модель предложила 6 тегов-кандидатов, разобраны так:
  #   - "кардио зона" — утверждена отдельным тегом (реальная отдельная зона в клубе)
  #   - "вентиляция" — утверждена отдельным тегом в категории "оснащение" (сквозная
  #     тема нескольких зон — особенно бассейн, там это реальная проблема клуба)
  #   - "приложение" — утверждена отдельным тегом в категории "UX" (запись на
  #     групповые через моб. приложение — темы, которой нет у WorldClass)
  #   - "сервис" — утверждена отдельным тегом в категории "сервис" (у клуба есть
  #     отдельная служба сервиса — не то же самое, что "чистота")
  #   - "массаж" — ОТКЛОНЕНА как дубль тега "спа" (то же самое по смыслу)
  #   - "оснащение" (как тег) — ОТКЛОНЕНА как дубль тега "оборудование" (модель
  #     продублировала название категории)
  # Вторая калибровка 2026-07-08 (после backfill 2ГИС до 100 отзывов) — модель
  # повторно предложила 7 кандидатов, ВСЕ отклонены как дубли/шум (описания тегов
  # выше усилены явными пометками "не заводить отдельно"):
  #   "оснащение"→оборудование, "санузел"→раздевалка, "бар"→кафе, "зона клуба"
  #   (дубль категории, не тег), "массаж"→спа, "инструкторы"→тренеры,
  #   "изменения"→организация (общая жалоба "стало хуже", не отдельная тема)
  # Новые теги, которые модель предложит при следующих разборах, так же попадают
  # в tag_dictionary со статусом pending_review — утверждать вручную по тому же
  # принципу (реальная новая тема vs дубль существующего тега/категории).


# =============================================================================
# ДВИЖОК — общие технические дефолты, унаследовано от WorldClass без изменений.
# Пересмотреть после 1-2 месяцев реальных данных Даудель Спорт (см. PLAN.md) —
# особенно alert_rules/chronic_tiers, которые были откалиброваны под объём и профиль
# жалоб конкретно WorldClass, не универсальны.
# =============================================================================

collection:
  backfill_lookback_days: 180   # глубина истории при первом запуске (не тянем всю историю за 10 лет)
  poll_interval_hours: 6        # как часто проверять новые отзывы (кроме 2ГИС — см. override у площадки)
  discover_new_platforms: true  # v2: раз в неделю искать площадки, которые ещё не добавлены вручную

  # Окна для неотвеченных отзывов (по review_date — дате самого отзыва, не дедлайна SLA),
  # см. main_watchdog.py / main_weekly_stale.py:
  #   0 .. watchdog_recent_days           -> суточный watchdog (ещё срочно)
  #   watchdog_recent_days .. stale_cutoff -> недельный обзор (уже не срочно, но не забыто)
  #   > watchdog_stale_cutoff_days        -> нигде не показывается, но остаётся pending в БД для статистики
  watchdog_recent_days: 90
  watchdog_stale_cutoff_days: 180

alert_rules:
  default:
    - {window_days: 30, yellow_at: 3, red_at: 5}
    - {window_days: 90, yellow_at: 3, red_at: 6}
  overrides: {}
  # Пример override под чувствительную тему:
  # "хамство персонала": [{window_days: 30, yellow_at: 1, red_at: 2}]

  chronic_tiers:
    - {window_days: 180, threshold: 6}
    - {window_days: 360, threshold: 9}
    - {window_days: 720, threshold: 14}

  # "Повторный негативщик" — см. подробный комментарий в clients/worldclass/client_config.yaml.
  # Значения унаследованы без калибровки на реальных данных Даудель Спорт (как и весь
  # блок "ДВИЖОК" выше) — пересмотреть вместе с остальными порогами.
  repeat_offender:
    min_negative_count: 3
    window_days: 60
    renotify_after_days: 2
    max_notifications: 3

reply_sla_hours:
  negative: 24
  neutral: 72
  positive: null   # ответ не обязателен
