          lookback_days: 60      # reviewsStartDate — выдача не строго по дате, без фильтра проскакивают древние отзывы
          poll_interval_hours: 24  # 1 раз в день, отдельно от остальных площадок (см. collection.poll_interval_hours)
        - type: yandex_maps
          url: "https://yandex.ru/maps/org/daudel_sport/1358525739/"
