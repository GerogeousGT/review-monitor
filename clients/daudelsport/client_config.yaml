# =============================================================================
# ЧЕК-ЛИСТ ПОД НОВОГО КЛИЕНТА — что реально нужно поменять при разворачивании
# на другую компанию (см. также PLAN.md):
#
#   1. Секция "КЛИЕНТ" ниже — название, точки, ссылки на площадки
#   2. tone_of_voice.md — переписать под голос нового бренда (шаблон структуры
#      можно оставить, содержание — нет)
#   3. clients/<slug>/.env — СВОИ TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID и APIFY_API_TOKEN
#      (не бот/аккаунт Жоржа и не бот/аккаунт предыдущего клиента — разный биллинг
#      Apify на разных клиентов). Корневой .env — только fallback для реально общих
#      ключей (PROXYAPI_KEY/GROQ_API_KEY), если один аккаунт LLM-провайдера на всех.
#   4. clients/<slug>/db/ — НЕ копировать от старого клиента, пусть создастся с нуля
#      (main_collect.py сам создаст пустую БД при первом запуске)
#   5. ПЕРВЫЙ сбор истории — ОБЯЗАТЕЛЬНО с флагом --backfill:
#      CLIENT_SLUG=<slug> python main_collect.py --backfill
#      Без флага следующий main_notify.py разошлёт карточку по КАЖДОМУ вставленному
#      отзыву одним пакетом (было на практике: 90 сообщений разом, 2026-07-09,
#      см. CHANGELOG). Это же касается любой ручной доливки старых отзывов в БД
#      в обход обычного цикла — не только самого первого запуска.
#   6. Секция "ШАБЛОН ПОД НИШУ" ниже — если новый клиент из ДРУГОЙ отрасли
#      (не фитнес-клуб) — переписать теги/категории полностью под его бизнес.
#      Если тоже фитнес — можно оставить как есть или точечно поправить.
#   7. Секция "ДВИЖОК" — можно стартовать с дефолтов (откалиброваны на первом
#      пилоте, разумные для большинства похожих бизнесов), пересмотреть после
#      1-2 месяцев реальных данных нового клиента — см. процесс в PLAN.md.
#
# СТАТУС ЭТОГО ФАЙЛА: каркас (2026-07-08). Ссылки на площадки найдены и проверены
# по факту существования (веб-поиск), но не прогнаны через main_collect.py — перед
# первым реальным запуском проверить вручную, что все 3 URL открываются и отдают
# отзывы (особенно 2ГИС — Apify actor ожидает ссылку на карточку, не на вкладку).
# =============================================================================


# =============================================================================
# КЛИЕНТ — обязательно поменять под нового
# =============================================================================
client:
  name: "Даудель Спорт"
  locations:
    - id: gorkogo68
      name: "Даудель Спорт, ул. Максима Горького, 68 к4"
      city: "Тюмень"
      platforms:
        - type: 2gis
          url: "https://2gis.ru/tyumen/firm/1830116630156385"
