# Золотой стандарт для Sentiment Analyst — World Class Тюмень. Реальные отзывы из
# БД, вручную сверенные Жоржем и Claude (2026-07-15). Не случайная выборка, а
# кейсы под конкретные "решающие узлы" логики: обычный позитив/негатив, скрытая
# проблема (высокий рейтинг + негативный тег внутри), многотемные смешанные
# отзывы, нейтральный тон без явной жалобы/похвалы, составной отзыв (дописан
# позже), обрезанный текст (реальная особенность живых данных).
#
# Запуск: tests/golden/run_eval.py worldclass (вручную, НЕ часть pytest tests/ —
# платные вызовы LLM). Гонять при смене модели/промпта/провайдера, не на каждый
# коммит. Порог принятия — 90% (см. PLAN.md/CHANGELOG 2026-07-15).
#
# Свой файл на клиента — НЕ общий с другими нишами (2026-07-15, решение Жоржа):
# "каждый клиент должен быть в закрытом контуре только своих данных", у клиента
# из другой ниши будет свой собственный dataset_<slug>.yaml с собственными
# решающими узлами под свою специфику, не подстройка общего датасета.
#
# Проверяем: (1) sentiment отзыва целиком — точное совпадение обязательно,
# (2) для каждого expected_tags — тег должен быть найден среди фактических с той
# же tag_sentiment. Лишние теги сверх ожидаемых НЕ считаются ошибкой. Отдельно
# ловится "галлюцинация" — тег, которого нет в активном словаре клиента, но
# модель вернула его с is_new=false (см. run_eval.py, найдено 2026-07-15).

