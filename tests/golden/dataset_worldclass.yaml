  text: "Пишу отзыв после года активных посещений. Один из лучших клубов города.\nПлюсы:\n- отличное оборудование;\n- тренерский состав, супервайзеры реально следят за зонами (видел как проверяли на чистоту каждый блин в зале и просили клининг исправить);\n- бассейн, хамам, сауны, все в отличном состоянии. \n- размер раздевалок и шкафчиков.\n- зона приема пищи.\n\nНо есть и пара минусов:\n- фитнес клуб работает с 6.30, а гардероб с 9.00, по итогу если ходишь утром, то гардероб для тебя не доступен. Можно конечно попросить администратора, но тогда в комплекте будет недовольство или игнорирование, как повезет. Сделайте тогда уж возможность самостоятельно пользоваться гардеробом.\n- не самая лучшая вентиляция в раздевалках, и откровенно плохая в уборных.\n\nЧтобы хотелось улучшить:\n- проработать ситуацию с гардеробом;\n- обдумать замену тренажеров которыми никто не пользуется на более актуальные (например заменить гакк-присед на приседания с поясом) \n- поставить зеркало напротив смит-машины"
  expected_sentiment: positive
  expected_tags:
    - {tag: "оборудование", sentiment: positive}
    - {tag: "тренеры", sentiment: positive}
    - {tag: "чистота", sentiment: positive}
    - {tag: "бассейн", sentiment: positive}
    - {tag: "раздевалка", sentiment: negative}
    - {tag: "администраторы", sentiment: negative}
    - {tag: "душевые", sentiment: negative}
  note: >
    самый многотемный отзыв в датасете (10 тегов в реальной разметке) —
    структурированный плюсы/минусы. Также содержит "гардероб" (не заведённый
