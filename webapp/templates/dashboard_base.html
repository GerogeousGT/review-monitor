{% extends "base.html" %}
{% block body %}
<style>
  .db-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }
  .db-topbar-left { display: flex; align-items: center; gap: 20px; }
  .db-back {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.875rem;
  }
  .db-back:hover { color: var(--text); }
  .db-title { font-weight: 700; font-size: 1.0625rem; }
  .db-tabs {
    display: flex;
    gap: 4px;
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
  }
  .db-tab {
    padding: 12px 18px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 600;
    border-bottom: 2px solid transparent;
  }
  .db-tab.active {
    color: var(--text);
    border-bottom-color: var(--accent-2);
  }
  .db-tab:hover:not(.active) { color: var(--text); }
  .db-main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }
  .db-empty {
    color: var(--text-dim);
    font-size: 0.9375rem;
    text-align: center;
    padding: 60px 20px;
  }
</style>
<div class="db-topbar">
  <div class="db-topbar-left">
    <a class="db-back" href="{{ url_for('index') }}">&larr; Все клиенты</a>
    <div class="db-title">{{ display_name }}</div>
  </div>
  <div class="user-info">
    {{ current_user.username }}
    <a href="{{ url_for('logout') }}">Выйти</a>
  </div>
</div>
<div class="db-tabs">
  <a class="db-tab {% if active_tab == 'overview' %}active{% endif %}" href="{{ url_for('dashboard', slug=slug) }}">Обзор</a>
  <a class="db-tab {% if active_tab == 'reviews' %}active{% endif %}" href="{{ url_for('dashboard_reviews', slug=slug) }}">Лента отзывов</a>
</div>
<div class="db-main">
  {% if no_data %}
  <div class="db-empty">Пока нет собранных данных для этого клиента.</div>
  {% else %}
  {% block dashboard_content %}{% endblock %}
  {% endif %}
</div>
{% endblock %}
