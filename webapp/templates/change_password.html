{% extends "base.html" %}
{% block title %}Смена пароля — ReviewPulse{% endblock %}
{% block body %}
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px;
  }
  .login-card .brand {
    text-align: center;
    margin-bottom: 12px;
    font-size: 1.25rem;
  }
  .hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.875rem;
    margin-bottom: 24px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 0.8125rem;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 11px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-size: 0.9375rem;
  }
  .field input:focus {
    outline: none;
    border-color: var(--accent-2);
  }
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    color: #0c1119;
    font-weight: 700;
    font-size: 0.9375rem;
    cursor: pointer;
    margin-top: 6px;
  }
  button:hover { opacity: 0.92; }
  .error {
    background: rgba(234, 94, 110, 0.12);
    border: 1px solid rgba(234, 94, 110, 0.35);
    color: var(--danger);
    font-size: 0.875rem;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 16px;
  }
</style>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">Review<span class="accent">Pulse</span></div>
    <div class="hint">
      {% if forced %}
        Это временный пароль — задайте свой перед продолжением.
      {% else %}
        Смена пароля.
      {% endif %}
    </div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="field">
        <label for="new_password">Новый пароль</label>
        <input type="password" id="new_password" name="new_password" minlength="8" autofocus required>
      </div>
      <div class="field">
        <label for="confirm_password">Повторите пароль</label>
        <input type="password" id="confirm_password" name="confirm_password" minlength="8" required>
      </div>
      <button type="submit">Сохранить</button>
    </form>
  </div>
</div>
{% endblock %}
