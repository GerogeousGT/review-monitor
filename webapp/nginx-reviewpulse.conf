# reviewpulse.ru — review-monitor webapp (дашборд + webhook).
#
# ВНИМАНИЕ (уточнено 2026-07-17): это только HTTP-каркас, каким конфиг был ДО
# certbot. На реальном VPS (/etc/nginx/sites-enabled/reviewpulse) certbot дописал
# полноценный 443 ssl-блок (Let's Encrypt, автопродление) поверх этого файла —
# живой конфиг на сервере НЕ совпадает с тем, что лежит здесь в репозитории.
# Telegram принимает webhook только по HTTPS (main_set_webhook.py регистрирует
# https://reviewpulse.ru/telegram/webhook/<slug>), поэтому 443-блок на проде
# обязателен и уже есть. НЕ НАКАТЫВАТЬ этот файл поверх боевого конфига "как
# есть" — это уберёт 443/TLS и сломает и HTTPS, и webhook. Если нужно
# воспроизвести реальный конфиг с нуля — гонять `certbot --nginx` заново после
# применения этого HTTP-каркаса, не копировать файл вручную.

server {
    listen 80;
    listen [::]:80;
    server_name reviewpulse.ru www.reviewpulse.ru;

    location / {
        proxy_pass http://127.0.0.1:8789;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
