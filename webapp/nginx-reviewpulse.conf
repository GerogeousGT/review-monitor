# reviewpulse.ru — review-monitor webapp (дашборд + webhook, в разработке).
# HTTPS-блок добавит certbot --nginx после того, как DNS применится и появится
# возможность выпустить сертификат Let's Encrypt (см. PLAN.md, CHANGELOG 2026-07-14).

server {
    listen 80;
    listen [::]:80;
    server_name reviewpulse.ru www.reviewpulse.ru;

    location / {
        proxy_pass http://127.0.0.1:8789;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
